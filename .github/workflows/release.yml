name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Create release archive
        run: |
          zip -r macro-engine-${{ github.ref_name }}.zip . \
            -x "*.git*" \
               ".github/*" \
               "*.zip" \
               "*.md" \
               "CONTRIBUTING.md" \
               "SECURITY.md"

      - name: 🚀 Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            "macro-engine-${{ github.ref_name }}.zip" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
