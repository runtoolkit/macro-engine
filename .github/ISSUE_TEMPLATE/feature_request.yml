name: Feature Request
description: Suggest a new feature
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Feature idea
      placeholder: Describe your idea
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this useful?
      placeholder: Explain the use case
